<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语音对话 Demo</title>

  <!-- React 18 + Babel (CDN，无需工程化) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    #root { display: flex; flex-direction: column; align-items: center;
            max-width: 600px; margin: 0 auto; padding: 28px 16px 48px; gap: 16px; }

    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }

    .chat-box {
      width: 100%; background: #fff; border-radius: 18px; padding: 16px;
      min-height: 320px; max-height: 440px; overflow-y: auto;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      display: flex; flex-direction: column; gap: 10px;
    }
    .msg { max-width: 76%; padding: 10px 14px; border-radius: 14px;
           font-size: 15px; line-height: 1.55; word-break: break-word; white-space: pre-wrap; }
    .msg.bot  { background: #e9e9ec; color: #1a1a1a; align-self: flex-start; }
    .msg.user { background: #007aff; color: #fff;     align-self: flex-end; }

    .viz-wrap { width: 100%; border-radius: 12px; overflow: hidden; background: #1c1c1e; }
    canvas    { width: 100%; height: 56px; display: block; }

    .record-btn {
      width: 148px; height: 148px; border-radius: 50%; border: none;
      background: #007aff; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 24px rgba(0,122,255,.38);
      transition: transform .12s, background .15s, box-shadow .15s;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .record-btn:disabled { opacity: .45; cursor: not-allowed; }
    .record-btn.recording {
      background: #ff3b30; box-shadow: 0 4px 24px rgba(255,59,48,.45);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    .status-bar { display: flex; align-items: center; gap: 6px;
                  font-size: 13px; color: #666; min-height: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc;
           flex-shrink: 0; transition: background .3s; }
    .dot.ok { background: #34c759; }
  </style>
</head>
<body>
<div id="root"></div>

<!-- AudioWorklet Processor (Blob URL — 避免单文件跨域限制) -->
<script id="worklet-src" type="text/plain">
class PCMProcessor extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0][0];
    if (ch && ch.length) {
      const i16 = new Int16Array(ch.length);
      for (let i = 0; i < ch.length; i++) {
        const s = Math.max(-1, Math.min(1, ch[i]));
        i16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      this.port.postMessage(i16.buffer, [i16.buffer]);
    }
    return true;
  }
}
registerProcessor("pcm-processor", PCMProcessor);
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const WS_URL      = "ws://localhost:8765";
const SAMPLE_RATE = 16000;

/* ── PCM 播放 ─────────────────────────────────────────────────────────────── */
function playPCM(b64, sr) {
  const bin   = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ac = new AudioContext({ sampleRate: sr });
  const n  = bytes.length / 2;
  const f32 = new Float32Array(n);
  const dv  = new DataView(bytes.buffer);
  for (let i = 0; i < n; i++) f32[i] = dv.getInt16(i * 2, true) / 32768;
  const buf = ac.createBuffer(1, n, sr);
  buf.copyToChannel(f32, 0);
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(ac.destination);
  src.start();
  return new Promise(res => { src.onended = () => { ac.close(); res(); }; });
}

/* ── 波形可视化 ────────────────────────────────────────────────────────────── */
function Visualizer({ analyserRef, recording }) {
  const cvs = useRef(null);
  const raf = useRef(null);

  useEffect(() => {
    const canvas = cvs.current;
    const ctx    = canvas.getContext("2d");
    function draw() {
      raf.current = requestAnimationFrame(draw);
      const w = canvas.width  = canvas.offsetWidth;
      const h = canvas.height = 56;
      ctx.fillStyle = "#1c1c1e";
      ctx.fillRect(0, 0, w, h);
      const a = analyserRef.current;
      if (!a) return;
      const data = new Uint8Array(a.frequencyBinCount);
      a.getByteFrequencyData(data);
      const bw = (w / data.length) * 2.5;
      ctx.fillStyle = recording ? "#ff3b30" : "#007aff";
      let x = 0;
      for (let i = 0; i < data.length; i++) {
        ctx.fillRect(x, h - (data[i] / 255) * h, bw, (data[i] / 255) * h);
        x += bw + 1;
      }
    }
    draw();
    return () => cancelAnimationFrame(raf.current);
  }, [analyserRef, recording]);

  return (
    <div className="viz-wrap">
      <canvas ref={cvs} />
    </div>
  );
}

/* ── 主应用 ────────────────────────────────────────────────────────────────── */
function App() {
  const [connected,  setConnected]  = useState(false);
  const [recording,  setRecording]  = useState(false);
  const [status,     setStatus]     = useState("正在连接服务器...");
  const [messages,   setMessages]   = useState([
    { id: 0, role: "bot", text: "你好！按住下方按钮说话，松开后自动识别并回复。" },
  ]);

  const wsRef        = useRef(null);
  const audioCtxRef  = useRef(null);
  const streamRef    = useRef(null);
  const workletRef   = useRef(null);
  const analyserRef  = useRef(null);
  const recordingRef = useRef(false);
  const chatEndRef   = useRef(null);

  const addMsg = useCallback((role, text) => {
    setMessages(prev => [...prev, { id: Date.now() + Math.random(), role, text }]);
  }, []);

  /* WebSocket */
  const connect = useCallback(() => {
    if (wsRef.current) return;
    const ws = new WebSocket(WS_URL);
    wsRef.current = ws;

    ws.onopen = () => { setConnected(true); setStatus("已连接，按住按钮开始录音"); };

    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "status") {
        setStatus(msg.message);
      } else if (msg.type === "text") {
        addMsg(msg.role ?? "user", msg.text);
      } else if (msg.type === "audio") {
        addMsg("bot", "🔊 正在播放语音回复...");
        setStatus("正在播放...");
        await playPCM(msg.data, msg.sampleRate || 16000);
        setStatus("已连接，按住按钮开始录音");
      } else if (msg.type === "error") {
        setStatus("⚠️ " + msg.message);
      }
    };

    ws.onclose = () => {
      wsRef.current = null;
      setConnected(false);
      setStatus("连接断开，5秒后重连...");
      setTimeout(connect, 5000);
    };
    ws.onerror = () => ws.close();
  }, [addMsg]);

  useEffect(() => {
    connect();
    return () => wsRef.current?.close();
  }, [connect]);

  /* 自动滚到底部 */
  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  /* document 级 mouseup / touchend，松开在任意位置都能停止 */
  useEffect(() => {
    const up = () => stopRecording();
    document.addEventListener("mouseup",  up);
    document.addEventListener("touchend", up);
    return () => {
      document.removeEventListener("mouseup",  up);
      document.removeEventListener("touchend", up);
    };
  }, []);   // stopRecording 用 ref，不需要列为依赖

  /* 开始录音 */
  async function startRecording() {
    if (recordingRef.current) return;
    const ws = wsRef.current;
    if (!ws || ws.readyState !== WebSocket.OPEN) { setStatus("未连接，请稍候"); return; }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: { sampleRate: SAMPLE_RATE, channelCount: 1,
                 echoCancellation: true, noiseSuppression: true }
      });
      streamRef.current = stream;

      const ac = new AudioContext({ sampleRate: SAMPLE_RATE });
      audioCtxRef.current = ac;

      const src = ac.createMediaStreamSource(stream);

      const analyser = ac.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);
      analyserRef.current = analyser;

      /* AudioWorklet — 通过 Blob URL 内联，绕过单文件跨域限制 */
      const code    = document.getElementById("worklet-src").textContent;
      const blob    = new Blob([code], { type: "application/javascript" });
      const blobURL = URL.createObjectURL(blob);
      await ac.audioWorklet.addModule(blobURL);
      URL.revokeObjectURL(blobURL);

      const worklet = new AudioWorkletNode(ac, "pcm-processor");
      worklet.port.onmessage = (ev) => {
        if (!recordingRef.current) return;
        if (ws.readyState === WebSocket.OPEN) ws.send(ev.data);
      };
      src.connect(worklet);
      worklet.connect(ac.destination);
      workletRef.current = worklet;

      recordingRef.current = true;
      setRecording(true);
      setStatus("录音中...");
    } catch (err) {
      setStatus("麦克风错误：" + err.message);
    }
  }

  /* 停止录音 */
  function stopRecording() {
    if (!recordingRef.current) return;
    recordingRef.current = false;
    setRecording(false);

    workletRef.current?.disconnect();  workletRef.current  = null;
    analyserRef.current?.disconnect(); analyserRef.current = null;
    audioCtxRef.current?.close();     audioCtxRef.current = null;
    streamRef.current?.getTracks().forEach(t => t.stop()); streamRef.current = null;

    const ws = wsRef.current;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "end" }));
      setStatus("处理中...");
    }
  }

  return (
    <>
      <h1>🎙️ 语音对话 Demo</h1>

      <div className="chat-box">
        {messages.map(m => (
          <div key={m.id} className={`msg ${m.role}`}>{m.text}</div>
        ))}
        <div ref={chatEndRef} />
      </div>

      <Visualizer analyserRef={analyserRef} recording={recording} />

      <button
        className={`record-btn${recording ? " recording" : ""}`}
        disabled={!connected}
        onMouseDown={e => { e.preventDefault(); startRecording(); }}
        onTouchStart={e => { e.preventDefault(); startRecording(); }}
      >
        {!connected ? "未连接" : recording ? "松开发送" : "按住说话"}
      </button>

      <div className="status-bar">
        <span className={`dot${connected ? " ok" : ""}`} />
        <span>{status}</span>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
